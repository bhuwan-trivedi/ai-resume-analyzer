version: "3.8"

services:
  mongodb:
    image: mongo:6.0
    container_name: ai-resume-analyzer-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai-resume-network

  app:
    build: .
    container_name: ai-resume-analyzer-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/ai-resume-analyzer
    depends_on:
      - mongodb
    volumes:
      - ./uploads:/app/uploads
    networks:
      - ai-resume-network

volumes:
  mongodb_data:

networks:
  ai-resume-network:
    driver: bridge
